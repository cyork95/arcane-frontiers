#================================================================
# Arcane Frontiers — server.properties
# NeoForge 1.21.1 | Family Server Configuration
# Tuned for 2-6 players on family hardware
# Last reviewed: See ARCANE_FRONTIERS.md version header
#================================================================

# ---------------------------------------------------------------
# NETWORK
# ---------------------------------------------------------------

server-port=25565
# Standard Minecraft port. If another Minecraft server runs on
# this machine, change to 25566 or any unused port above 1024.

online-mode=true
# Authenticates players against Mojang servers.
# Keep TRUE for security. Only set false on a LAN with no internet.

white-list=true
enforce-whitelist=true
# Whitelist is ON. Add family members with:
#   /whitelist add [playername]
# enforce-whitelist=true kicks whitelisted players who log in
# before being added, even if they authenticated via Mojang.

enable-rcon=false
# Remote Console - disabled. Not needed for family LAN/home server.
# Enabling it with a weak password is a security risk.
rcon.port=25575
rcon.password=

# ---------------------------------------------------------------
# WORLD GENERATION
# ---------------------------------------------------------------

level-name=world
level-type=minecraft\:normal
# Leave as "normal" — Terralith overrides terrain generation
# automatically via its NeoForge mod hooks. Do NOT set to
# "terralith" or any custom type; that will break the load.

generate-structures=true
# REQUIRED. YUNG's Better Dungeons, Dungeons and Taverns,
# Create: Dynamic Village, and MineColonies Supply Ships all
# depend on vanilla structure generation being enabled.

allow-nether=true
# Nether access is needed for: Incendium biomes, YUNG's Nether
# Fortresses, Blaze Rods (Ch 3.4 quests), Ancient Debris,
# and MineColonies Nether Mine (Ch 6.8).

spawn-protection=16
# 16-block radius around world spawn is protected from non-ops.
# Increase to 32 if your MineColonies Town Hall is placed near
# spawn, to prevent accidental damage to early colony buildings.

max-world-size=29999984
# Full vanilla world size. Terralith needs space to generate its
# 95+ biomes including rare ones (Moonlit Grove, Skylands, etc.)
# that players will hunt with Nature's Compass quests.

# ---------------------------------------------------------------
# PERFORMANCE
# ---------------------------------------------------------------

view-distance=10
# How many chunks in each direction the server sends to clients.
# 10 is the sweet spot for this pack: enough to see Terralith
# landscapes without overwhelming server CPU.
# DROP TO 8 if TPS falls below 18 during peak sessions.
# Never set above 12 with this modpack installed.

simulation-distance=8
# Controls how far entities, redstone, and crop growth simulate.
# Keep 2 below view-distance. This is the single biggest TPS
# lever in vanilla — reducing it from 10 to 8 can recover
# 2-3 TPS near busy Create factories and Alex's Mobs spawns.

max-tick-time=60000
# Watchdog timer in milliseconds (60 seconds).
# If a single tick takes longer than this, the server kills
# itself and generates a crash report. 60s is generous — a
# genuinely hung server will still be caught, but brief GC
# pauses or chunk generation spikes won't false-trigger a kill.

entity-broadcast-range-percentage=75
# Default is 100. Setting to 75 means entities only sync to
# clients within 75% of normal range. Big TPS and bandwidth win
# near Alex's Mobs wildlife spawns and MineColonies citizen
# pathfinding. Players won't notice the difference.

network-compression-threshold=256
# Compresses packets larger than 256 bytes. Good default for
# LAN and home network servers. Raise to 512 if players on
# the same LAN report jitter; lower to 128 for WAN connections.

# ---------------------------------------------------------------
# PLAYERS
# ---------------------------------------------------------------

max-players=6
# Hard cap. Family of 6 is a safe ceiling for the recommended
# 6-8 GB server RAM config. Increase to 8 only if you upgrade
# server RAM and reduce view-distance to compensate.

player-idle-timeout=0
# 0 = never kick idle players. Good for family sessions where
# someone steps away. Set to 30 (minutes) if server resources
# are very tight.

allow-flight=false
# Keep false — Elytra and modded flight (Ars Nouveau levitation
# spells) are handled correctly by NeoForge. Setting true just
# suppresses the "illegal flight" kick for exploiters.

pvp=false
# PvP OFF for family server. No accidental deaths during
# collaborative builds. Flip to true only if the whole family
# agrees for a dedicated PvP session.

# ---------------------------------------------------------------
# GAMEPLAY
# ---------------------------------------------------------------

difficulty=normal
# Normal difficulty. Monsters deal standard damage.
# Hard is available for experienced players but not recommended
# as the default — Alex's Mobs hostile creatures on Hard can
# wipe younger players unexpectedly.

gamemode=survival
force-gamemode=false
# Survival mode default. force-gamemode=false lets ops switch
# to creative for building/admin without affecting other players.

hardcore=false
# Family server — no permadeath. Never change this.

allow-cheats=true
# Needed for these pack-critical commands:
#   /ftbquests — opens quest management (non-op players use P key)
#   /gamerule keepInventory true — set after world creation
#   /tfprogress reset @a — Twilight Forest progression fix
#   /minecolonies — colony admin commands
# This does NOT enable creative mode for all players.
# Individual cheat access is controlled by ops.json.

# ---------------------------------------------------------------
# MISC
# ---------------------------------------------------------------

motd=§aArcane Frontiers §7» Magic × Technology × Exploration
# Server list display name. Shows as:
#   [green] Arcane Frontiers  [grey]>> Magic x Technology x Exploration

hide-online-players=false
use-native-transport=true
# Native transport (Netty epoll on Linux) improves network
# throughput. Has no effect on Windows — leave true regardless.

enable-status=true
enable-query=false
# enable-query opens an additional UDP port for server list
# aggregators. Not needed for a private family server.

sync-chunk-writes=true
# Ensures chunk data is fully written to disk before
# acknowledging. Prevents world corruption on server crash.
# Minor performance cost is worth the data safety.

op-permission-level=4
# Full operator permissions for trusted family admin accounts.
# Level 3 is sufficient if you want ops to manage the server
# but not change game rules or bypass spawn protection.

function-permission-level=2
# Allows command blocks and data packs to run standard commands.
# Required for some FTB Quests reward functions.
